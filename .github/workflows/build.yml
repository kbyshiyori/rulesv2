name: build-rules

on:
  schedule:
    # Johnshall rebuilds upstream ~08:00 Beijing (00:00 UTC); build a bit after.
    - cron: "0 1 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "rules/**"
      - "targets/**"
      - ".github/workflows/build.yml"

# Publish the built config to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # NextDNS DoH URL (境外 DNS). Empty until the secret is set -> upstream DNS is kept.
      # NOTE: the built config is published publicly on Pages, so this URL is public by
      # design (accepted: it only selects an ad-block config). See README > Delivery.
      NEXTDNS_DOH_URL: ${{ secrets.NEXTDNS_DOH_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Shadowrocket backcn config
        run: |
          python targets/shadowrocket/build.py \
            --rules rules/redirect-to-cn.list \
            --dns "$NEXTDNS_DOH_URL" \
            --out _site/sr-backcn.conf

      # enablement:true turns Pages on (Source: GitHub Actions) via API on first run,
      # so no manual Settings step is needed — repo must be public (or Pages-enabled plan).
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
